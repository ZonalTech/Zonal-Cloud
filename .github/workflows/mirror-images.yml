# Mirror the public base images the platform depends on into GHCR, so the VPS
# never pulls from Docker Hub (which rate-limits anonymous pulls and 404s mid-
# pull). GitHub's runners do the Hub pulls (higher limits); the VPS then pulls
# everything from ghcr.io, where it is already authenticated.
#
# Mirrored as: ghcr.io/<owner>/zonal-cloud/mirror/<name>:<tag>
# The compose files reference these via ${MIRROR_REGISTRY}/<name>:<tag>.
#
# Triggers: weekly schedule (keep tags fresh), manual dispatch, and on changes
# to this workflow. Re-running is safe and idempotent.

name: mirror-images

on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/mirror-images.yml"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # source = the Docker Hub reference; dest = the mirror repo name (the
        # tag is preserved from the source).
        include:
          - { source: "traefik:v3.7.5", name: "traefik" }
          - { source: "postgres:16-alpine", name: "postgres" }
          - { source: "mariadb:10.6", name: "mariadb" }
          - { source: "redis:7-alpine", name: "redis" }
          - { source: "powerdns/pdns-auth-49:latest", name: "pdns-auth-49" }
          - { source: "traefik/whoami:latest", name: "whoami" }
          - { source: "nginx:1.27-alpine", name: "nginx" }
          - { source: "axllent/mailpit:latest", name: "mailpit" }
          - { source: "stalwartlabs/stalwart:latest", name: "stalwart" }
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror image
        env:
          SOURCE: ${{ matrix.source }}
          NAME: ${{ matrix.name }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          OWNER="${OWNER,,}"                 # GHCR requires lowercase
          REPO="${GITHUB_REPOSITORY,,}"      # e.g. zonaltech/zonal-cloud
          TAG="${SOURCE##*:}"                # tag portion of the source
          DEST="${REGISTRY}/${REPO}/mirror/${NAME}:${TAG}"

          echo "Mirroring ${SOURCE} -> ${DEST}"
          # Pull all platforms so the mirror works on any arch the VPS runs.
          docker buildx imagetools create --tag "${DEST}" "docker.io/${SOURCE}" \
            || { docker pull "${SOURCE}" && docker tag "${SOURCE}" "${DEST}" && docker push "${DEST}"; }
          echo "Done: ${DEST}"
