# docker-compose.yml — Zonal Cloud infrastructure services
# Owned by: proxy agent (SPEC section 2)
# Brings up: Traefik, Postgres, Redis, and the shared network.
#
# The API, dashboard, and admin apps are run via npm in dev.
# Commented stubs at the bottom show how to add them to compose later
# (e.g., for staging/production or integration testing).
#
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose up -d
#
# Postgres is reachable by the API at:
#   - host=postgres  port=5432  (from another container on zonal_net)
#   - host=localhost port=5432  (from the host machine / npm dev process)
# Redis is reachable by the API at:
#   - host=redis     port=6379  (from another container on zonal_net)
#   - host=localhost port=6379  (from the host machine / npm dev process)

# ------------------------------------------------------------------
# Shared network
# All infrastructure services and deployed app containers join this
# network. Traefik watches ONLY this network (SPEC section 6).
# ------------------------------------------------------------------
networks:
  zonal_net:
    name: zonal_net
    driver: bridge

# ------------------------------------------------------------------
# Named volumes
# ------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  mariadb_data:
  stalwart_data:
  # VPS (future): uncomment to persist Let's Encrypt certificates.
  # letsencrypt:

# ------------------------------------------------------------------
# Services
# ------------------------------------------------------------------
services:

  # ----------------------------------------------------------------
  # Traefik v3 reverse proxy
  # SPEC section 5: port 80 (entry) + 8080 (dashboard)
  # SPEC section 6: watches zonal_net for labelled containers
  # ----------------------------------------------------------------
  traefik:
    # v3.7+ works with Docker Engine 28/29 (API >= 1.44). Older images (v3.3) fail
    # with "client version 1.24 is too old"; the DOCKER_API_VERSION env below also
    # forces a compatible API version for the provider.
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/traefik:v3.7.5
    container_name: traefik
    restart: unless-stopped
    environment:
      # Pin the Docker client API version Traefik negotiates. Without this it
      # defaults to 1.24, which Docker Engine 28/29 rejects ("client version too old").
      - DOCKER_API_VERSION=1.44
    ports:
      # Traefik owns host port 80 so deployed apps are reached at clean URLs
      # (http://<slug>.localhost, no port). Requires port 80 to be free — the
      # host nginx that previously held it must be stopped+disabled:
      #   sudo systemctl disable --now nginx
      - "80:80"       # HTTP entrypoint
      - "8080:8080"   # Traefik dashboard (LOCAL only; secure or remove for VPS)
      # VPS (future): expose HTTPS entrypoint
      # - "443:443"
    volumes:
      # Static config
      - ./services/proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      # Docker socket so Traefik can read container labels
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # VPS (future): persist ACME certificates
      # - letsencrypt:/letsencrypt
    networks:
      - zonal_net
    labels:
      - "traefik.enable=false"   # Do not route Traefik itself through Traefik.

  # ----------------------------------------------------------------
  # Postgres 16
  # SPEC section 5: port 5432
  # ----------------------------------------------------------------
  postgres:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zonal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-zonal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Exposed to host so npm dev process (api) can connect directly.
    networks:
      - zonal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zonal} -d ${POSTGRES_DB:-zonal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # MariaDB 10.6 — shared database server for Frappe apps
  # Frappe-type apps get a dedicated database + scoped user provisioned here by
  # the API (MariadbProvisionService). `bench new-site` connects as root to
  # bootstrap a site. Reachable by:
  #   - host=mariadb   port=3306  (from app containers / bench step on zonal_net)
  #   - host=127.0.0.1 port=3306  (from the host-run API for DDL)
  # ----------------------------------------------------------------
  mariadb:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/mariadb:10.6
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme}
    command:
      # Frappe requires these server settings.
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"   # Exposed to host so the npm dev API can run DDL directly.
    networks:
      - zonal_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Redis 7
  # SPEC section 5: port 6379
  # ----------------------------------------------------------------
  redis:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"   # Exposed to host so npm dev process (api) can connect directly.
    networks:
      - zonal_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes   # Enable AOF persistence.

  # ----------------------------------------------------------------
  # PowerDNS Authoritative Server (managed DNS hosting product)
  # Serves customer zones over DNS (host port 53 UDP+TCP) and is controlled by
  # the API over its HTTP API (:8081, internal to zonal_net only — never exposed
  # to the host). Zone/record data lives in a dedicated `pdns` database inside
  # the shared Postgres server (gpgsql backend); the API also keeps a DnsZone
  # row per customer zone for ownership/billing/quota.
  #
  # Customers sell-side flow: they point their domain's NS records at
  # ns1.oponde.top / ns2.oponde.top (glue at the registrar), the API creates the
  # zone here, and pdns answers authoritatively.
  #
  # The pdns schema must exist before pdns starts. It is created by
  #   services/dns/schema.sql  (run once against the `pdns` database).
  # See docs/dns.md for the one-time bootstrap (create db + load schema).
  # ----------------------------------------------------------------
  pdns:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/pdns-auth-49:latest
    container_name: pdns
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Base config (gpgsql backend, API/webserver). Replaces the image default
      # which would otherwise launch the sqlite3 backend and fail to start.
      - ./services/dns/pdns.conf:/etc/powerdns/pdns.conf:ro
    command:
      # Secrets and per-deploy values stay out of the committed conf file.
      - "--gpgsql-dbname=${PDNS_DB:-pdns}"
      - "--gpgsql-user=${POSTGRES_USER:-zonal}"
      - "--gpgsql-password=${POSTGRES_PASSWORD:-changeme}"
      - "--api-key=${PDNS_API_KEY:-changeme-pdns-api-key}"
      # Default SOA for newly created zones (customers point NS here).
      - "--default-soa-content=ns1.${DNS_BASE_DOMAIN:-oponde.top} hostmaster.${DNS_BASE_DOMAIN:-oponde.top} 0 10800 3600 604800 3600"
    ports:
      # Authoritative DNS on the host's port 53 (UDP + TCP). Requires port 53 to
      # be free — disable the host stub resolver if it holds 53:
      #   sudo sed -i 's/#\?DNSStubListener=.*/DNSStubListener=no/' /etc/systemd/resolved.conf
      #   sudo systemctl restart systemd-resolved
      - "53:53/udp"
      - "53:53/tcp"
      # NOTE: 8081 (HTTP API) is intentionally NOT published to the host — it is
      # only reachable in-network at http://pdns:8081 by the API container.
    networks:
      - zonal_net

  # ----------------------------------------------------------------
  # Whoami test service
  # Validates the routing contract end-to-end (SPEC section 6).
  # After `docker compose up -d`, visit http://whoami.localhost
  # to confirm Traefik is routing correctly.
  # Remove or comment out this service once the routing is verified.
  # ----------------------------------------------------------------
  whoami:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/whoami:latest
    container_name: whoami
    restart: unless-stopped
    networks:
      - zonal_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=web"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"

  # ----------------------------------------------------------------
  # Fallback "site not available" page
  # Catch-all target for any host that does NOT match a deployed app.
  # Traefik routes by Host() rules from app containers (default priority);
  # this router uses HostRegexp matching ANY host at the lowest priority (1),
  # so a real app always wins and only unknown subdomains land here. Replaces
  # Traefik's bare "404 page not found" with a page that tells the owner to
  # open the dashboard, check status/logs, and redeploy.
  # ----------------------------------------------------------------
  fallback:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/nginx:1.27-alpine
    container_name: zonal-fallback
    restart: unless-stopped
    environment:
      # Origin of the user dashboard the landing page links to. Override on VPS.
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:5173}
    volumes:
      - ./services/proxy/fallback/index.html:/opt/fallback-template/index.html:ro
      - ./services/proxy/fallback/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/proxy/fallback/entrypoint.sh:/docker-entrypoint.d/99-zonal-fallback.sh:ro
    networks:
      - zonal_net
    labels:
      - "traefik.enable=true"
      # Match any host (Go regexp), lowest priority so specific Host() routers win.
      - "traefik.http.routers.zonal-fallback.rule=HostRegexp(`^.+$`)"
      - "traefik.http.routers.zonal-fallback.entrypoints=web"
      - "traefik.http.routers.zonal-fallback.priority=1"
      - "traefik.http.services.zonal-fallback.loadbalancer.server.port=80"

  # ----------------------------------------------------------------
  # Mailpit — local SMTP server + web inbox for testing email
  # (password reset links). Open-source. Catches all outgoing mail.
  #   SMTP:    localhost:1025  (point the API's SMTP_HOST/SMTP_PORT here)
  #   Web UI:  http://localhost:8025  (read the captured emails)
  # In dev you can skip this entirely — without SMTP configured the API
  # returns the reset link in the response. This just gives a real inbox.
  # ----------------------------------------------------------------
  mailpit:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - zonal_net

  # ----------------------------------------------------------------
  # Stalwart — all-in-one mail server (SMTP/IMAP/JMAP + web admin)
  # Managed-mail product. The web admin/JMAP UI (port 8080 in-container) is
  # routed through Traefik at mail.<domain>; the mail protocol ports are
  # published on the host so the server can send/receive real mail.
  # Data (config, accounts, queues, messages) persists in the stalwart volume.
  # First-run admin credentials come from the .env (seeded by the zone CLI).
  # ----------------------------------------------------------------
  stalwart:
    image: ${MIRROR_REGISTRY:-ghcr.io/zonaltech/zonal-cloud/mirror}/stalwart:latest
    container_name: stalwart
    restart: unless-stopped
    environment:
      # Stalwart 0.16+ pins the recovery/bootstrap admin via STALWART_RECOVERY_ADMIN
      # in "user:password" form, applied on every start. Without it Stalwart
      # generates a random temp password (printed once in the logs).
      STALWART_RECOVERY_ADMIN: ${MAIL_ADMIN_USER:-admin}:${MAIL_ADMIN_PASSWORD:-changeme-mail-admin}
    volumes:
      - stalwart_data:/opt/stalwart-mail
    ports:
      - "25:25"     # SMTP (MX / inbound)
      - "465:465"   # SMTPS (submission, implicit TLS)
      - "587:587"   # submission (STARTTLS)
      - "143:143"   # IMAP
      - "993:993"   # IMAPS
    networks:
      - zonal_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zonal-mail.rule=Host(`${MAIL_HOST:-mail.localhost}`)"
      - "traefik.http.routers.zonal-mail.entrypoints=web"
      - "traefik.http.services.zonal-mail.loadbalancer.server.port=8080"

