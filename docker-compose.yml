  #     - "traefik.http.routers.dashboard.entrypoints=web"
  #     - "traefik.http.services.dashboard.loadbalancer.server.port=80"

  # ----------------------------------------------------------------
  # STUB: Admin service (run via npm in dev; add to compose for staging)
  # SPEC section 5: admin dev port 5174
  # ----------------------------------------------------------------
  # admin:
  #   build:
  #     context: ./apps/admin
