  # ----------------------------------------------------------------
  # STUB: Dashboard service (run via npm in dev; add to compose for staging)
  # SPEC section 5: dashboard dev port 5173
  # ----------------------------------------------------------------
  # dashboard:
  #   build:
  #     context: ./apps/dashboard
  #     dockerfile: Dockerfile
  #   container_name: dashboard
  #   restart: unless-stopped
