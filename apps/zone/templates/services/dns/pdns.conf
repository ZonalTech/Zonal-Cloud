# PowerDNS Authoritative config for Zonal Cloud managed DNS.
# Mounted at /etc/powerdns/pdns.conf, replacing the image default (which
# launches the sqlite3 backend). We use the gpgsql backend against the shared
# Postgres `pdns` database. Secrets (db password, API key) are injected via the
# launch command's --gpgsql-password / --api-key in docker-compose so they stay
# out of this committed file.

launch=gpgsql
gpgsql-host=postgres
gpgsql-port=5432
gpgsql-dbname=pdns
gpgsql-user=zonal

# Listen on all interfaces inside the container (host maps 53 / local 15353).
local-address=0.0.0.0
local-port=53

# HTTP API + webserver for the platform API to drive zones/records.
api=yes
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0

version-string=anonymous
