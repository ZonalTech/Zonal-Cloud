# nginx config for the Zonal Cloud fallback "site not available" page.
# This container is the catch-all target: Traefik routes any host that does
# not match a deployed app here (lowest-priority router). Whatever path the
# visitor requested, we serve the friendly landing page — with a 404 status,
# so the response still reflects "no such site" for clients and monitors.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # Serve the landing page body for every request, but with a 404 status.
    location / {
        return 404;
    }

    error_page 404 /index.html;
    location = /index.html {
        internal;
        add_header Cache-Control "no-store" always;
    }
}
