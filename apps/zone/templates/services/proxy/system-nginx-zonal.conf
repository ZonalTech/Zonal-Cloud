# Zonal Cloud — host nginx reverse proxy so deployed apps are reachable on the
# standard HTTP port (:80) with NO port in the URL (http://<slug>.localhost
# instead of http://<slug>.localhost:8090).
#
# Why this exists: on this machine the system nginx already owns host :80 (it
# serves other sites such as "tinly"), so Zonal's Traefik is published on :8090.
# Rather than take :80 away from nginx, we add this: nginx keeps :80 and simply
# forwards every *.localhost request to Traefik on 127.0.0.1:8090. Traefik then
# routes by Host header to the right app container.
#
# Scoped to "<slug>.localhost" so it does NOT affect the existing default/tinly
# sites (which match their own server_name / are the default_server).
#
# This file goes in conf.d/ (included at http scope) so the `map` below is
# valid alongside the server block.
#
# Install (needs sudo):
#   sudo cp services/proxy/system-nginx-zonal.conf /etc/nginx/conf.d/zonal.conf
#   sudo nginx -t && sudo nginx -s reload
#
# After this, http://<slug>.localhost (no port) works. Set the API env so the
# dashboard shows portless URLs too:  APP_HTTP_PORT=""  (see apps/api/.env)

# WebSocket/SSE upgrade handling: "upgrade" when the client requests it, else
# "close". Lives at http scope (conf.d include), referenced by the server below.
map $http_upgrade $zonal_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;

    # Match any single-label subdomain of localhost: <slug>.localhost.
    # Does not match bare "localhost" or other domains, so existing sites are
    # untouched.
    server_name ~^(?<slug>[^.]+)\.localhost$;

    # Generous limits for app uploads / streaming responses.
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8090;

        # Preserve the original Host so Traefik can route by <slug>.localhost.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / SSE support (app websockets, streamed responses).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $zonal_connection_upgrade;

        # Don't buffer streamed responses (SSE).
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
