# docker-compose.vps.yml — Zonal Cloud VPS / production TLS overlay.
#
# Stacked on top of docker-compose.yml + docker-compose.prod.yml by zonalctl
# whenever DOMAIN is set (a real cloud VPS deployment):
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.prod.yml \
#                  -f docker-compose.vps.yml up -d
#
# What it changes vs. the local HTTP setup:
#   - Traefik serves HTTPS on :443 using the rendered traefik.prod.yml
#     (Let's Encrypt). HTTP/:80 is kept only for the ACME/redirect path.
#   - Certificates are persisted in the `letsencrypt` named volume.
#   - api / dashboard / admin routers are bound to the `websecure` entrypoint
#     with certResolver=letsencrypt, so each gets an auto-renewed cert.

volumes:
  # Persists Let's Encrypt's acme.json across restarts (survives `down`).
  letsencrypt:

services:
  traefik:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Override the static config with the production (TLS) one.
      - ./services/proxy/traefik.prod.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  api:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zonal-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.zonal-api.entrypoints=websecure"
      - "traefik.http.routers.zonal-api.tls=true"
      - "traefik.http.routers.zonal-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.zonal-api.loadbalancer.server.port=4000"

  dashboard:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zonal-dashboard.rule=Host(`${DASHBOARD_HOST}`)"
      - "traefik.http.routers.zonal-dashboard.entrypoints=websecure"
      - "traefik.http.routers.zonal-dashboard.tls=true"
      - "traefik.http.routers.zonal-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.zonal-dashboard.loadbalancer.server.port=80"

  admin:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zonal-admin.rule=Host(`${ADMIN_HOST}`)"
      - "traefik.http.routers.zonal-admin.entrypoints=websecure"
      - "traefik.http.routers.zonal-admin.tls=true"
      - "traefik.http.routers.zonal-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.zonal-admin.loadbalancer.server.port=80"

  stalwart:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zonal-mail.rule=Host(`${MAIL_HOST}`)"
      - "traefik.http.routers.zonal-mail.entrypoints=websecure"
      - "traefik.http.routers.zonal-mail.tls=true"
      - "traefik.http.routers.zonal-mail.tls.certresolver=letsencrypt"
      - "traefik.http.services.zonal-mail.loadbalancer.server.port=8080"
